<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech App - Consulta de Produtos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0051cb; }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #0070f3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Consulta de Produto Digital</h1>
        <input type="text" id="codigoInput" placeholder="Ex: CC, CD, EMP, INV">
        <br>
        <button onclick="consultarProduto()">Consultar</button>
        <div id="resultado">Digite um código acima...</div>
    </div>

    <script src="index.js"></script>
</body>
</html>
